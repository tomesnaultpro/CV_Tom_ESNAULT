<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaintGab Radio 🎙</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111;
    --surface2: #181818;
    --border: #222;
    --accent: #ff2d55;
    --accent2: #ff9500;
    --text: #f0f0f0;
    --muted: #555;
    --dim: #333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,45,85,0.12), transparent),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,149,0,0.07), transparent);
    pointer-events: none;
    z-index: 0;
  }
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 20px 30px;
  }
  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,45,85,0.12);
    border: 1px solid rgba(255,45,85,0.3);
    border-radius: 30px;
    padding: 6px 16px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .station-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 8rem);
    letter-spacing: 0.05em;
    line-height: 0.9;
    color: var(--text);
    margin-bottom: 12px;
  }
  .station-title span { color: var(--accent); }
  .station-desc { color: var(--muted); font-size: 0.9rem; max-width: 400px; margin: 0 auto; }
  .player-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    padding: 0 20px 40px;
  }
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .yt-container {
    position: relative;
    padding-bottom: 56.25%;
    background: #000;
  }
  .yt-container iframe {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .offline-screen {
    display: none;
    padding: 40px 20px;
    text-align: center;
    background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
  }
  .offline-icon { font-size: 3.5rem; margin-bottom: 14px; display: block; }
  .offline-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .offline-sub { font-size: 0.8rem; color: var(--dim); }
  .controls-bar {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-top: 1px solid var(--border);
  }
  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-weight: 700;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .visualizer { display: flex; gap: 3px; align-items: flex-end; height: 28px; flex-shrink: 0; }
  .vis-bar {
    width: 3px; border-radius: 2px; background: var(--accent); min-height: 3px;
    animation: vis 0.6s ease-in-out infinite alternate;
  }
  .vis-bar:nth-child(1){animation-delay:0s;animation-duration:0.5s}
  .vis-bar:nth-child(2){animation-delay:0.1s;animation-duration:0.7s}
  .vis-bar:nth-child(3){animation-delay:0.2s;animation-duration:0.4s}
  .vis-bar:nth-child(4){animation-delay:0.05s;animation-duration:0.6s}
  .vis-bar:nth-child(5){animation-delay:0.15s;animation-duration:0.8s}
  .vis-bar:nth-child(6){animation-delay:0.25s;animation-duration:0.5s;background:var(--accent2)}
  @keyframes vis { from{height:3px} to{height:22px} }
  footer {
    position: relative; z-index: 1; text-align: center;
    padding: 20px; font-size: 0.7rem; color: var(--dim); font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<script>
  // =====================================================
  // ✏️ MODIFIE CES 3 LIGNES AVEC TES INFOS
  // =====================================================
  const YOUTUBE_LIVE_ID = "COLLE_TON_ID_ICI"; // ← ID YouTube (ex: dQw4w9WgXcQ)
  const STATION_NAME    = "SaintGab Radio";    // ← Nom de ta radio
  const STATION_DESC    = "une radio scolaire"; // ← Description
  // =====================================================
</script>

<div class="hero">
  <div class="live-pill"><span class="live-dot"></span>En direct</div>
  <h1 class="station-title">SAINT<span>GAB</span><br>RADIO</h1>
  <p class="station-desc" id="stationDesc"></p>
</div>

<div class="player-wrap">
  <div class="player-card">
    <div class="yt-container" id="ytContainer">
      <iframe id="ytFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div class="offline-screen" id="offlineScreen">
      <span class="offline-icon">📻</span>
      <div class="offline-title">Hors antenne</div>
      <div class="offline-sub">La radio reprend bientôt…</div>
    </div>
    <div class="controls-bar">
      <div class="track-info">
        <div class="track-name" id="trackName"></div>
        <div class="track-sub">EN DIRECT • OBS → YOUTUBE</div>
      </div>
      <div class="visualizer">
        <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
        <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
      </div>
    </div>
  </div>
</div>

<footer id="footerText"></footer>

<script>
  document.getElementById('trackName').textContent = STATION_NAME;
  document.getElementById('stationDesc').textContent = STATION_DESC;
  document.getElementById('footerText').textContent = STATION_NAME.toUpperCase() + ' — 100% GRATUIT';

  if(YOUTUBE_LIVE_ID && YOUTUBE_LIVE_ID !== "COLLE_TON_ID_ICI") {
    document.getElementById('ytFrame').src =
      'https://www.youtube.com/embed/' + YOUTUBE_LIVE_ID + '?autoplay=1&rel=0&modestbranding=1';
  } else {
    document.getElementById('ytContainer').style.display = 'none';
    document.getElementById('offlineScreen').style.display = 'block';
  }
</script>

</body>
</html>
