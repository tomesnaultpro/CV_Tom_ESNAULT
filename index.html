<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV — Tom Esnault</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0ece0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 1px solid rgba(232,184,75,0.2);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: #e8b84b;
      letter-spacing: 0.05em;
    }

    .header-sub {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.1em;
    }

    .download-btn {
      background: #e8b84b;
      color: #0a0a0a;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .download-btn:hover { background: #f0ca6e; }

    .pdf-container {
      flex: 1;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }

    iframe {
      width: 100%;
      max-width: 900px;
      height: calc(100vh - 140px);
      min-height: 600px;
      border: none;
      background: white;
    }

    /* Fallback si iframe ne marche pas */
    .fallback {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
    }
    .fallback a {
      color: #e8b84b;
      font-size: 1.1rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.1em;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    @media (max-width: 600px) {
      .pdf-container { padding: 1rem 0.5rem; }
      iframe { height: calc(100vh - 120px); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Tom Esnault</div>
    <div class="header-sub">Son · Lumière · Vidéo · Événementiel</div>
  </div>
  <a class="download-btn" href="CV_Tom_ESNAULT.pdf" download>⬇ Télécharger le CV</a>
</header>

<div class="pdf-container">
  <iframe 
    src="CV_Tom_ESNAULT.pdf"
    title="CV Tom Esnault"
    onerror="document.querySelector('.fallback').style.display='block'; this.style.display='none';">
  </iframe>
  <div class="fallback">
    <p>Impossible d'afficher le PDF directement.<br><br>
    <a href="CV_Tom_ESNAULT.pdf" target="_blank">👉 Cliquer ici pour l'ouvrir</a></p>
  </div>
</div>

<footer>© 2025 Tom Esnault — tomesnaultpro@gmail.com</footer>

</body>
</html>
